# Local one-command run for the Hardware Service Decision Copilot (ADR-000).
# MVP target: local dev + Docker Compose (no cloud).
# NOTE: Dockerfiles are added during the implementation phase. This compose file
# documents the intended two-container topology and wiring.

services:
  backend:
    build:
      context: ./app/backend
    # image: copilot-backend:dev   # built from app/backend/Dockerfile (to add)
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?set in .env}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_TEXT_MODEL: ${OPENROUTER_TEXT_MODEL:-openai/gpt-5.4-mini}
      OPENROUTER_VISION_MODEL: ${OPENROUTER_VISION_MODEL:-openai/gpt-5.4}
      APP_CORS_ALLOWED_ORIGIN: http://localhost:4200
      SERVER_PORT: "8080"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: ./app/frontend
    # image: copilot-frontend:dev  # static Angular build served by nginx (to add)
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy
